          args: --release --out dist --find-interpreter --manifest-path demangle-gnuv2-py/Cargo.toml
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: 2_28
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}-py${{ matrix.python.version }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        python:
          - version: "3.13"
          - version: "3.14"
          - version: "3.14t"
